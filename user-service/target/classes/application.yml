server:
  port: 8082
  tomcat:
    max-http-form-post-size: 10MB

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  application:
    name: user-service

  # PostgreSQL Database Connection
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/user_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Hibernate/JPA configurations
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
