      targetPort: 8085
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:v6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          envFrom:
            - secretRef:
                name: banking-secrets
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms128m -Xmx256m"

            - name: DB_HOST
              value: "postgres"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: MAIL_HOST
              value: "smtp.gmail.com"
            - name: MAIL_PORT
              value: "587"
            - name: MAIL_AUTH
              value: "true"
            - name: MAIL_STARTTLS
              value: "true"
