services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - banking-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly no
    volumes:
      - redis_data:/data
    networks:
      - banking-network
    restart: unless-stopped

  kafka:
    image: bitnamilegacy/kafka:3.4.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - banking-network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - banking-network
    restart: unless-stopped

  discovery-server:
    build:
      context: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - banking-network
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - EUREKA_SERVER_HOST=discovery-server
    depends_on:
      - redis
      - discovery-server
    networks:
      - banking-network
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - EUREKA_SERVER_HOST=discovery-server
    depends_on:
      - postgres
      - redis
      - discovery-server
    networks:
      - banking-network
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    environment:
      - DB_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_SERVER_HOST=discovery-server
    depends_on:
      - postgres
      - kafka
      - discovery-server
    networks:
      - banking-network
    restart: unless-stopped

  account-service:
    build:
      context: ./account-service
    container_name: account-service
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_SERVER_HOST=discovery-server
    depends_on:
      - postgres
      - redis
      - kafka
      - discovery-server
    networks:
      - banking-network
    restart: unless-stopped

  transaction-service:
    build:
      context: ./transaction-service
    container_name: transaction-service
    environment:
      - DB_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_SERVER_HOST=discovery-server
    depends_on:
      - postgres
      - kafka
      - discovery-server
    networks:
      - banking-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    environment:
      - DB_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MAIL_HOST=mailhog
      - EUREKA_SERVER_HOST=discovery-server
    depends_on:
      - postgres
      - kafka
      - mailhog
      - discovery-server
    networks:
      - banking-network
    restart: unless-stopped

networks:
  banking-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
