spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    enabled: false

spring.kafka.consumer.auto-offset-reset: earliest
spring.kafka.bootstrap-servers: localhost:9092
# mock kafka or just let it fail silently as handled in code? We can use mock bean in test.
