server:
  port: 8083

spring:
  application:
    name: account-service

  # PostgreSQL Database Connection
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/account_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Hibernate/JPA configurations
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration for Balance Caching
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
