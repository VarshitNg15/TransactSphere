server:
  port: 8080
  tomcat:
    max-http-form-post-size: 10MB


spring:
  application:
    name: gateway
  config:
    import: optional:file:../.env[.properties]
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  # Redis Configuration for Rate Limiting & Gateway sessions
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '/**':
            allowedOriginPatterns: 
              - "http://localhost:5173"
              - "https://*.vercel.app"
              - "https://*.ngrok-free.app"
              - "https://*.ngrok.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
            
      routes:
        # Auth Service Route
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        # User Service Route
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        # Account Service Route
        - id: account-service
          uri: http://account-service:8083
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        # Transaction Service Route
        - id: transaction-service
          uri: http://transaction-service:8084
          predicates:
            - Path=/api/v1/transactions/**,/api/v1/requests/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        # Notification Service Route
        - id: notification-service
          uri: http://notification-service:8085
          predicates:
            - Path=/api/v1/notifications/**

        # Fraud Service Route
        - id: fraud-service
          uri: http://fraud-service:8086
          predicates:
            - Path=/api/v1/fraud/**

        # Analytics Service Route
        - id: analytics-service
          uri: http://analytics-service:8087
          predicates:
            - Path=/api/v1/analytics/**

        # Audit Service Route
        - id: audit-service
          uri: http://audit-service:8088
          predicates:
            - Path=/api/v1/audit/**

        # Statement Service Route
        - id: statement-service
          uri: http://statement-service:8089
          predicates:
            - Path=/api/v1/statements/**

        # Admin Service Route
        - id: admin-service
          uri: http://admin-service:8090
          predicates:
            - Path=/api/v1/admin/**

# Gateway JWT configurations
jwt:
  secret: ${JWT_SECRET} # HS256 base64-encoded secret key
  expiration: 86400000 # 24 hours in milliseconds

# Spring Boot Actuator settings
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,gateway
  endpoint:
    health:
      show-details: always
