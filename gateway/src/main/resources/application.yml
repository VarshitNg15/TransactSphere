server:
  port: 8080

spring:
  application:
    name: gateway
  
  # Redis Configuration for Rate Limiting & Gateway sessions
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
            
      routes:
        # Auth Service Route
        - id: auth-service
          uri: http://${AUTH_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        # User Service Route
        - id: user-service
          uri: http://${USER_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        # Account Service Route
        - id: account-service
          uri: http://${ACCOUNT_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        # Transaction Service Route
        - id: transaction-service
          uri: http://${TRANSACTION_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"

        # Notification Service Route
        - id: notification-service
          uri: http://${NOTIFICATION_SERVICE_HOST:localhost}:8085
          predicates:
            - Path=/api/v1/notifications/**

        # Fraud Service Route
        - id: fraud-service
          uri: http://${FRAUD_SERVICE_HOST:localhost}:8086
          predicates:
            - Path=/api/v1/fraud/**

        # Analytics Service Route
        - id: analytics-service
          uri: http://${ANALYTICS_SERVICE_HOST:localhost}:8087
          predicates:
            - Path=/api/v1/analytics/**

        # Audit Service Route
        - id: audit-service
          uri: http://${AUDIT_SERVICE_HOST:localhost}:8088
          predicates:
            - Path=/api/v1/audit/**

        # Statement Service Route
        - id: statement-service
          uri: http://${STATEMENT_SERVICE_HOST:localhost}:8089
          predicates:
            - Path=/api/v1/statements/**

        # Admin Service Route
        - id: admin-service
          uri: http://${ADMIN_SERVICE_HOST:localhost}:8090
          predicates:
            - Path=/api/v1/admin/**

# Gateway JWT configurations
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 # HS256 base64-encoded secret key
  expiration: 86400000 # 24 hours in milliseconds

# Spring Boot Actuator settings
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,gateway
  endpoint:
    health:
      show-details: always
