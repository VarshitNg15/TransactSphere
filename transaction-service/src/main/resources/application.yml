server:
  port: 8084



spring:
  application:
    name: transaction-service
  config:
    import: optional:file:../.env[.properties]

  # PostgreSQL Database Connection
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/transaction_db
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # Hibernate/JPA configurations
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: "event:com.transactsphere.transaction.dto.TransactionEvent"

# Account Service Client Configuration
account-service:
  url: http://${ACCOUNT_SERVICE_HOST:localhost}:8083

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
