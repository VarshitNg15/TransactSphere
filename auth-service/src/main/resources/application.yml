server:
  port: 8081

spring:
  application:
    name: auth-service

  # PostgreSQL Database Connection
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Hibernate/JPA configurations
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration for blacklisting logouts & tracking token states
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

jwt:
  # Base64 HS256 secret key (same as gateway)
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 3600000       # 1 hour in ms
  refresh-expiration: 604800000 # 7 days in ms

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
